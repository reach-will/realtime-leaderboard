apiVersion: v1
kind: Service
metadata:
  name: leaderboard-api-service
  namespace: default
  labels:
    app: leaderboard-api
spec:
  selector:
    app: leaderboard-api
  type: ClusterIP
  ports:
  - port: 2113
    name: admin
    targetPort: admin
  - port: 50051
    name: grpc
    targetPort: grpc
