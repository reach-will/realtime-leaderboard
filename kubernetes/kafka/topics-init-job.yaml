apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-init
  namespace: default
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-topics-init
          image: apache/kafka:3.9.0
          command:
            - /bin/sh
            - -c
            - |
              until /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server kafka:9092; do
                echo "Waiting for Kafka..."; sleep 3
              done
              /opt/kafka/bin/kafka-topics.sh \
                --create --if-not-exists \
                --topic leaderboard.match.completed \
                --bootstrap-server kafka:9092 \
                --partitions 30 \
                --replication-factor 1
              /opt/kafka/bin/kafka-topics.sh \
                --create --if-not-exists \
                --topic leaderboard.match.completed.dlt \
                --bootstrap-server kafka:9092 \
                --partitions 1 \
                --replication-factor 1
