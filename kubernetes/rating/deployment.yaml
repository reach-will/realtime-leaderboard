apiVersion: apps/v1
kind: Deployment
metadata:
  name: rating-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rating
  template:
    metadata:
      labels:
        app: rating
    spec:
      initContainers:
        - name: wait-for-topic
          image: apache/kafka:3.9.0
          command:
            - /bin/sh
            - -c
            - |
              until /opt/kafka/bin/kafka-topics.sh --describe \
                --topic gamesession.match.completed \
                --bootstrap-server kafka:9092; do
                echo "Waiting for topic..."; sleep 3
              done
      containers:
        - name: leaderboard-rating
          image: ghcr.io/reach-will/realtime-leaderboard/rating:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: leaderboard-rating-config
          ports:
            - name: admin
              containerPort: 2112
          readinessProbe:
            httpGet:
              path: /healthz
              port: admin
          livenessProbe:
            httpGet:
              path: /healthz
              port: admin
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
